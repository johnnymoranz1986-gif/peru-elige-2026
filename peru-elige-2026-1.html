<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perú Elige 2026 — ONPE en Vivo</title>
  <style>
    body, html { margin:0; padding:0; height:100%; background:#060608; overflow:hidden; }
    .header {
      background:#060608; color:white; text-align:center; padding:15px 10px; font-size:22px; font-weight:bold;
      border-bottom:1px solid #E8A030;
    }
    .iframe-container { height:calc(100vh - 70px); width:100%; }
    iframe { width:100%; height:100%; border:none; }
  </style>
</head>
<body>

  <!-- Tu título bonito -->
  <div class="header">
    🇵🇪 PERÚ ELIGE 2026<br>
    <span style="font-size:14px; opacity:0.9;">Resultados oficiales ONPE en tiempo real</span>
  </div>

  <!-- IFRAME con la página OFICIAL de la ONPE -->
  <div class="iframe-container">
    <iframe 
      src="https://resultadoelectoral.onpe.gob.pe/" 
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
